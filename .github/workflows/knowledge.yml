name: 라온고 오늘의 지식

on:
  schedule:
    # 10:00 UTC = 19:00 KST 매일. 큐레이션 풀에서 1장 게시.
    - cron: '0 10 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  knowledge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 파이썬 의존성 + 크로뮴 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: secrets.json 작성 (GitHub Secret에서)
        env:
          IG_SECRETS_JSON: ${{ secrets.IG_SECRETS_JSON }}
        run: printf '%s' "$IG_SECRETS_JSON" > secrets.json

      - name: 오늘의 지식 게시
        run: python cloud_run_knowledge.py

      - name: 갱신된 토큰을 Secret에 다시 저장 (GH_PAT 있을 때만)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT 미설정 — 토큰 자동갱신 저장 생략"
            exit 0
          fi
          gh secret set IG_SECRETS_JSON --repo "$GITHUB_REPOSITORY" < secrets.json
