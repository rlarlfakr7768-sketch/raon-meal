name: 라온고 주간 급식 미리보기

on:
  schedule:
    # 12:00 UTC = 21:00 KST 일요일. 다음 주 월~금 점심을 phyedu_net 에 게시.
    - cron: '0 12 * * 0'
  workflow_dispatch: {}

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 파이썬 의존성 + 크로뮴 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: secrets.json 작성 (GitHub Secret에서)
        env:
          IG_SECRETS_JSON: ${{ secrets.IG_SECRETS_JSON }}
        run: printf '%s' "$IG_SECRETS_JSON" > secrets.json

      - name: 주간 미리보기 게시
        run: python cloud_run_weekly.py

      - name: 갱신된 토큰을 Secret에 다시 저장 (GH_PAT 있을 때만)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT 미설정 — 토큰 자동갱신 저장 생략"
            exit 0
          fi
          gh secret set IG_SECRETS_JSON --repo "$GITHUB_REPOSITORY" < secrets.json
