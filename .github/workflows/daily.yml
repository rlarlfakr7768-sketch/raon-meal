name: 라온고 급식 자동 게시

on:
  schedule:
    # 21:08 UTC=06:08 KST(1차) + 21:38 UTC=06:38 KST(백업). GitHub 정각 누락 회피용으로
    # 분을 비키고 백업을 둠. 둘 다 떠도 meal_last.txt 마커로 이중게시 차단. 주말/방학은 스킵.
    - cron: '8 21 * * *'
    - cron: '38 21 * * *'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 파이썬 의존성 + 크로뮴 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: secrets.json 작성 (GitHub Secret에서)
        env:
          IG_SECRETS_JSON: ${{ secrets.IG_SECRETS_JSON }}
        run: printf '%s' "$IG_SECRETS_JSON" > secrets.json

      - name: 급식 게시
        env:
          NEIS_KEY: ${{ secrets.NEIS_KEY }}
        run: python cloud_run.py

      - name: 갱신된 토큰을 Secret에 다시 저장 (GH_PAT 있을 때만)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT 미설정 — 토큰 자동갱신 저장 생략(약 60일마다 IG_SECRETS_JSON 재설정 필요)"
            exit 0
          fi
          gh secret set IG_SECRETS_JSON --repo "$GITHUB_REPOSITORY" < secrets.json
