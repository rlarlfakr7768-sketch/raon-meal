name: 라온고 급식 자동 게시

on:
  schedule:
    # 22:30 UTC = 07:30 KST (매일). 주말/방학은 스크립트가 알아서 건너뜀.
    - cron: '30 22 * * *'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 파이썬 의존성 + 크로뮴 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: secrets.json 작성 (GitHub Secret에서)
        env:
          IG_SECRETS_JSON: ${{ secrets.IG_SECRETS_JSON }}
        run: printf '%s' "$IG_SECRETS_JSON" > secrets.json

      - name: 급식 게시
        run: python cloud_run.py

      - name: 갱신된 토큰을 Secret에 다시 저장
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set IG_SECRETS_JSON --repo "$GITHUB_REPOSITORY" < secrets.json
