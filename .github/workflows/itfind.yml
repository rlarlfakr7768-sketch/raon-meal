name: 이주의 IT 트렌드 (주간기술동향)

on:
  schedule:
    # 매주 일요일 02:00 UTC = 일요일 11:00 KST (주간 레터) — 새 호일 때만 게시
    - cron: '0 2 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  itfind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 파이썬 의존성 + 크로뮴 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: secrets.json 작성 (GitHub Secret에서)
        env:
          IG_SECRETS_JSON: ${{ secrets.IG_SECRETS_JSON }}
        run: printf '%s' "$IG_SECRETS_JSON" > secrets.json

      - name: IT 트렌드 게시 (AI 미사용 — 공식 초록 그대로)
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python cloud_run_itfind.py

      - name: 갱신된 토큰을 Secret에 다시 저장 (GH_PAT 있을 때만)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT 미설정 — 토큰 자동갱신 저장 생략"
            exit 0
          fi
          gh secret set IG_SECRETS_JSON --repo "$GITHUB_REPOSITORY" < secrets.json
